<style>
:root{--brand:#ff4d2e;--bd:#d93d20;--dark:#0a0a0f;--d2:#13131a;--d3:#1c1c26;--mid:#2a2a38;--bdr:rgba(255,255,255,0.08);--txt:#f0f0f5;--mut:#7878a0;--r:14px;--rs:8px;--f:'Plus Jakarta Sans',sans-serif;--fd:'Syne',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--dark);color:var(--txt);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:var(--f);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--f)}
a{text-decoration:none;color:inherit}

.hdr{position:sticky;top:0;z-index:100;height:64px;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:1200px;margin:0 auto;height:100%;display:flex;align-items:center;padding:0 24px;gap:6px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;margin-right:auto}
.logo-ic{width:34px;height:34px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.logo-ic svg{width:20px;height:20px}
.logo-tx{font-family:var(--fd);font-size:18px}
.logo-tx b{color:var(--brand)}
.nav{display:flex;align-items:center;gap:2px}
.nb{padding:7px 13px;border-radius:var(--rs);font-size:14px;font-weight:500;color:var(--mut);transition:.15s}
.nb:hover{color:var(--txt);background:var(--mid)}
.ndd{position:relative}
.ndd:hover .ddm{display:grid}
.ddm{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;grid-template-columns:repeat(3,172px);gap:3px 14px;box-shadow:0 20px 60px rgba(0,0,0,.5);min-width:544px}
.ddh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);padding:4px 8px 8px}
.ddi{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rs);font-size:13px;color:var(--mut);transition:.15s;text-align:left;width:100%}
.ddi:hover{background:var(--mid);color:var(--txt)}
.ddot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-r{display:flex;align-items:center;gap:7px;margin-left:12px}
.bg{padding:7px 15px;border-radius:var(--rs);font-size:14px;font-weight:500;color:var(--mut);transition:.15s}
.bg:hover{color:var(--txt);background:var(--mid)}
.bp{padding:8px 18px;background:var(--brand);color:#fff;border-radius:var(--rs);font-size:14px;font-weight:700;transition:.2s}
.bp:hover{background:var(--bd)}
.mbb{display:none;padding:8px;font-size:20px;color:var(--txt)}
.mmenu{display:none;flex-direction:column;background:var(--d2);border-top:1px solid var(--bdr);padding:10px;gap:3px}
.mmenu.open{display:flex}
.mi{padding:11px 15px;border-radius:var(--rs);font-size:14px;color:var(--mut);text-align:left;transition:.15s}
.mi:hover{background:var(--mid);color:var(--txt)}
.mi.ac{background:var(--brand);color:#fff;font-weight:700}
.msep{height:1px;background:var(--bdr);margin:5px 0}

.adw{max-width:1200px;margin:0 auto;padding:0 24px}
.adb{background:var(--d2);border:1px dashed var(--bdr);border-radius:var(--rs);padding:10px 20px;text-align:center;margin:20px 0}
.adl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);display:block;margin-bottom:5px}
.adph{color:var(--mut);font-size:13px;padding:14px 0;background:rgba(255,255,255,.02);border-radius:6px}

.hero{max-width:1200px;margin:0 auto;padding:66px 24px 46px;display:flex;align-items:center;gap:54px}
.herol{flex:1}
.bdg{display:inline-flex;align-items:center;gap:5px;background:rgba(255,77,46,.1);color:var(--brand);border:1px solid rgba(255,77,46,.2);border-radius:100px;padding:5px 13px;font-size:13px;font-weight:600;margin-bottom:17px}
.h1{font-family:var(--fd);font-size:clamp(32px,5.5vw,60px);font-weight:800;line-height:1.1;margin-bottom:15px}
.ac{color:var(--brand)}
.hsub{font-size:16px;color:var(--mut);line-height:1.7;margin-bottom:24px;max-width:440px}
.hsc{display:flex;align-items:center;gap:9px;background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:4px 15px;max-width:420px;transition:.2s}
.hsc:focus-within{border-color:rgba(255,77,46,.4)}
.hsc input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--txt);padding:11px 0}
.hsc input::placeholder{color:var(--mut)}
.sic{color:var(--mut);font-size:17px}
.heror{flex:0 0 245px;display:flex;justify-content:center}
.pst{position:relative;width:162px;height:200px}
.pc{position:absolute;border-radius:12px;border:1px solid var(--bdr)}
.pc3{width:122px;height:162px;bottom:0;left:0;background:var(--d3);transform:rotate(-7deg)}
.pc2{width:135px;height:175px;bottom:8px;left:12px;background:var(--mid);transform:rotate(-2deg)}
.pc1{width:150px;height:188px;bottom:14px;left:13px;background:linear-gradient(135deg,#1c1c30,#13132a);border-color:rgba(255,77,46,.25);transform:rotate(2deg);display:flex;flex-direction:column;padding:14px;gap:7px}
.pln{flex:1;display:flex;flex-direction:column;gap:7px}
.pln div{height:3px;border-radius:2px;background:rgba(255,255,255,.07)}
.pln div:nth-child(1){width:80%}.pln div:nth-child(2){width:55%}.pln div:nth-child(3){width:70%}.pln div:nth-child(4){width:42%}
.pc1 span{color:var(--brand);font-size:10px;font-weight:700}

.sec{max-width:1200px;margin:0 auto;padding:0 24px 58px}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:17px;flex-wrap:wrap;gap:10px}
.sct{font-family:var(--fd);font-size:24px;font-weight:700}
.ctabs{display:flex;gap:3px;background:var(--d2);border:1px solid var(--bdr);border-radius:10px;padding:3px;flex-wrap:wrap}
.ctab{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--mut);transition:.15s}
.ctab:hover{color:var(--txt)}
.ctab.on{background:var(--brand);color:#fff}
.tgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.tc{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
.tc:hover{background:var(--d3);border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.tic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tb h3{font-size:13px;font-weight:700;margin-bottom:2px}
.tb p{font-size:11px;color:var(--mut);line-height:1.3}
.tar{font-size:15px;opacity:0;transition:.2s;flex-shrink:0}
.tc:hover .tar{opacity:1;transform:translateX(3px)}
.nores{text-align:center;padding:46px 20px;color:var(--mut)}
.nores p{font-size:16px;margin-bottom:9px}
.nores button{color:var(--brand);font-size:14px;font-weight:600}

.fgr{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.fcd{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:22px}
.fcd .fi{font-size:24px;margin-bottom:10px}
.fcd h3{font-size:15px;font-weight:700;margin-bottom:5px}
.fcd p{font-size:13px;color:var(--mut);line-height:1.6}

.sts{max-width:1200px;margin:0 24px 58px;display:flex;align-items:center;background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.st{flex:1;padding:24px 16px;text-align:center}
.st strong{display:block;font-family:var(--fd);font-size:28px;font-weight:800;color:var(--brand)}
.st span{font-size:13px;color:var(--mut)}
.stsp{width:1px;height:46px;background:var(--bdr);flex-shrink:0}

.tp{max-width:680px;margin:0 auto;padding:40px 24px 78px}
.bk{color:var(--brand);font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:20px}
.tph{display:flex;align-items:center;gap:14px;margin-bottom:26px;padding-bottom:20px;border-bottom:2px solid}
.tpic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tph h1{font-family:var(--fd);font-size:23px;font-weight:700;margin-bottom:3px}
.tph p{font-size:14px;color:var(--mut)}
.tpb{display:flex;flex-direction:column;gap:12px}

.dz{display:flex;flex-direction:column;align-items:center;gap:9px;border:2px dashed var(--bdr);border-radius:var(--r);padding:40px 20px;cursor:pointer;text-align:center;background:var(--d2);transition:.2s}
.dz:hover,.dz.drag{border-color:var(--brand);background:rgba(255,77,46,.04)}
.dzic{font-size:36px;color:var(--mut);transition:.2s}
.dz:hover .dzic{color:var(--brand)}
.dztt{font-size:15px;font-weight:700}
.dzsb{font-size:12px;color:var(--mut)}
.dzbt{background:var(--brand);color:#fff;padding:8px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;margin-top:3px}

.fl{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.flh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--mut)}
.flcl{color:var(--brand);font-size:13px;font-weight:600}
.flr{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
.flr:last-child{border-bottom:none}
.flbd{background:rgba(255,77,46,.1);color:var(--brand);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;flex-shrink:0}
.fln{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flsz{font-size:12px;color:var(--mut);flex-shrink:0}
.flac{display:flex;gap:3px}
.flac button{width:25px;height:25px;border-radius:5px;background:var(--mid);color:var(--mut);font-size:11px;display:flex;align-items:center;justify-content:center;transition:.15s}
.flac button:hover{background:var(--brand);color:#fff}
.flac button:disabled{opacity:.3;cursor:not-allowed}

.ob{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:17px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.og{display:flex;flex-direction:column;gap:5px;flex:1;min-width:90px}
.og label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)}
.oi{background:var(--mid);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:15px;font-weight:600;padding:9px 12px;outline:none;width:100%;transition:.2s}
.oi:focus{border-color:var(--brand)}
.os{color:var(--mut);font-size:17px;padding-top:16px}
.rbs{display:flex;gap:9px}
.rb{flex:1;padding:12px;background:var(--d2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--mut);font-size:14px;font-weight:600;transition:.2s}
.rb:hover,.rb.on{background:var(--brand);color:#fff;border-color:var(--brand)}

.ab{width:100%;padding:14px;background:var(--brand);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.ab:hover{background:var(--bd);transform:translateY(-1px)}
.ab:disabled{opacity:.5;cursor:not-allowed;transform:none}
.abo{background:transparent;border:1px solid var(--bdr);color:var(--txt)}
.abo:hover{background:var(--mid);transform:none}
.spn{width:19px;height:19px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.sb{display:flex;align-items:center;gap:12px;background:rgba(45,196,122,.07);border:1px solid rgba(45,196,122,.2);border-radius:var(--r);padding:12px 16px}
.sic2{width:32px;height:32px;border-radius:50%;background:rgba(45,196,122,.12);color:#2dc47a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.sb strong{display:block;color:#2dc47a;font-size:14px;margin-bottom:1px}
.sb p{font-size:13px;color:var(--mut)}

.lp{max-width:760px;margin:0 auto;padding:50px 24px 78px}
.lp h1{font-family:var(--fd);font-size:34px;font-weight:800;margin-bottom:7px}
.lp .upd{font-size:13px;color:var(--mut);margin-bottom:32px}
.lp h2{font-size:18px;font-weight:700;margin:28px 0 9px}
.lp p{font-size:15px;color:var(--mut);line-height:1.8;margin-bottom:12px}
.lp ul{margin:0 0 12px 18px}
.lp ul li{font-size:15px;color:var(--mut);line-height:1.8;margin-bottom:4px}
.lp a{color:var(--brand)}
.ldiv{height:1px;background:var(--bdr);margin:26px 0}
.cgr{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px}
.cic{display:flex;flex-direction:column;gap:14px}
.cic-c{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:18px}
.cic-c h3{font-size:15px;font-weight:700;margin-bottom:5px}
.cic-c p{font-size:13px;color:var(--mut)}
.cic-c a{color:var(--brand);font-size:14px;font-weight:600}
.cfm{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:12px}
.cfm label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);display:block;margin-bottom:4px}
.cfm input,.cfm textarea,.cfm select{width:100%;background:var(--mid);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:14px;padding:10px 12px;outline:none;transition:.2s;resize:none}
.cfm input:focus,.cfm textarea:focus,.cfm select:focus{border-color:var(--brand)}
.cfm textarea{height:105px}

.pgp{max-width:880px;margin:0 auto;padding:56px 24px 78px}
.pgh{text-align:center;margin-bottom:40px}
.pgh h1{font-family:var(--fd);font-size:34px;font-weight:800;margin-bottom:9px}
.pgh p{font-size:16px;color:var(--mut)}
.pgg{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px;margin-bottom:26px}
.pgc{background:var(--d2);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;position:relative}
.pgc.ft{border-color:var(--brand)}
.pgb{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;font-size:11px;font-weight:700;padding:3px 13px;border-radius:100px;white-space:nowrap}
.pgc h2{font-family:var(--fd);font-size:19px;margin-bottom:9px}
.pga{display:flex;align-items:baseline;gap:3px;margin-bottom:17px}
.pga strong{font-family:var(--fd);font-size:35px;font-weight:800;color:var(--brand)}
.pga span{font-size:14px;color:var(--mut)}
.pgfl{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.pgfl li{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:6px}
.pgfl li::before{content:"✓";color:var(--brand);font-weight:700}

.footer{background:var(--d2);border-top:1px solid var(--bdr);margin-top:54px}
.ftin{max-width:1200px;margin:0 auto;padding:50px 24px 32px;display:flex;gap:42px;flex-wrap:wrap}
.ftbr{flex:0 0 210px}
.ftbr p{font-size:13px;color:var(--mut);margin:9px 0 15px;line-height:1.6}
.socs{display:flex;gap:6px}
.soc{width:32px;height:32px;border-radius:7px;background:var(--mid);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mut);transition:.15s}
.soc:hover{background:var(--brand);color:#fff}
.ftcs{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:24px}
.ftc h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt);margin-bottom:10px}
.ftc button{display:block;font-size:13px;color:var(--mut);text-align:left;padding:3px 0;transition:.15s;width:100%}
.ftc button:hover{color:var(--txt)}
.ftbt{max-width:1200px;margin:0 auto;padding:15px 24px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--mut)}

@media(max-width:800px){
  .nav,.nav-r{display:none}
  .mbb{display:flex;margin-left:auto}
  .hero{flex-direction:column;padding:36px 20px;gap:24px}
  .heror{display:none}
  .h1{font-size:28px}
  .tgr{grid-template-columns:1fr 1fr}
  .sch{flex-direction:column;align-items:flex-start}
  .sts{flex-wrap:wrap;margin:0 20px 48px}
  .stsp{display:none}
  .ftin{gap:24px}
  .ftbr{flex:none}
  .pgg{grid-template-columns:1fr}
  .rbs{flex-direction:column}
  .cgr{grid-template-columns:1fr}
}
@media(max-width:480px){
  .tgr{grid-template-columns:1fr}
  .h1{font-size:24px}
  .ctabs{flex-wrap:wrap}
  .ctab{padding:5px 9px;font-size:12px}
}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const BACKEND="https://pdfforge-app.onrender.com";

const TOOLS=[

  {id:"edit",      icon:"✏️",label:"Edit PDF",          color:"#6a1de0",desc:"Add text, images and annotations",           cat:"edit",    ext:"pdf"},
  {id:"sign",      icon:"✍️",label:"Sign PDF",          color:"#1d8ae0",desc:"Add your signature to any PDF",              cat:"edit",    ext:"pdf"},

async function mergePDFs(files){
  const {PDFDocument}=await import("https://cdn.skypack.dev/pdf-lib");
  const out=await PDFDocument.create();
  for(const f of files){const b=await f.arrayBuffer();const d=await PDFDocument.load(b);const p=await out.copyPages(d,d.getPageIndices());p.forEach(pg=>out.addPage(pg));}
  return await out.save();
}
async function splitPDF(file,from,to){
  const {PDFDocument}=await import("https://cdn.skypack.dev/pdf-lib");
  const b=await file.arrayBuffer();const src=await PDFDocument.load(b);const out=await PDFDocument.create();
  const total=src.getPageCount();const idx=[];
  for(let i=Math.max(0,from-1);i<=Math.min(to-1,total-1);i++)idx.push(i);
  const p=await out.copyPages(src,idx);p.forEach(pg=>out.addPage(pg));
  return await out.save();
}
async function rotatePDF(file,deg){
  const {PDFDocument,degrees}=await import("https://cdn.skypack.dev/pdf-lib");
  const b=await file.arrayBuffer();const doc=await PDFDocument.load(b);
  doc.getPages().forEach(p=>p.setRotation(degrees(deg)));
  return await doc.save();
}
function dlBytes(bytes,name,type="application/pdf"){
  const blob=new Blob([bytes],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}
async function callBackend(toolId,files,extra={}){
  const fd=new FormData();
  if(["merge","jpg-pdf"].includes(toolId))files.forEach(f=>fd.append("files",f));
  else if(files.length)fd.append("file",files[0]);
  Object.entries(extra).forEach(([k,v])=>fd.append(k,v));
  const res=await fetch(`${BACKEND}/process/${toolId}`,{method:"POST",body:fd});
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(t||"Server error. If this is the first request, the server may be waking up — wait 30s and try again.");}
  return res.blob();
}

function App(){
  const getHash=()=>window.location.hash.replace("#","")||"home";
  const [page,setPage]=useState(getHash);
  const [mob,setMob]=useState(false);

  useEffect(()=>{
    const onPop=()=>{setPage(getHash());setMob(false);window.scrollTo(0,0);};
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  function nav(p){
    if(p===page)return;
    window.history.pushState(null,"","#"+p);
    setPage(p);setMob(false);window.scrollTo(0,0);
  }

  useEffect(()=>{
    const t=TOOLS.find(x=>x.id===page);
    document.title=t?`${t.label} — PDFForge | Free PDF Tools`:"PDFForge | 27+ Free PDF Tools Online";
  },[page]);

  const tool=TOOLS.find(t=>t.id===page);

  function render(){
    if(page==="home")     return <Home nav={nav}/>;
    if(page==="pricing")  return <Pricing/>;
    if(page==="security") return <Security/>;
    if(page==="privacy")  return <Privacy/>;
    if(page==="terms")    return <Terms/>;
    if(page==="cookies")  return <Cookies/>;
    if(page==="contact")  return <Contact/>;
    if(page==="merge")    return <MergePage nav={nav}/>;
    if(page==="split")    return <SplitPage nav={nav}/>;
    if(page==="rotate")   return <RotatePage nav={nav}/>;
    if(tool)              return <BackendPage toolId={page} nav={nav}/>;
    return <Home nav={nav}/>;
  }

  return(<div><Header nav={nav} mob={mob} setMob={setMob}/><main style={{minHeight:"80vh"}}>{render()}</main><Footer nav={nav}/></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
